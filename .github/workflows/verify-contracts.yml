name: Verify Contracts

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify contract sync
        run: |
          chmod +x scripts/sync-contracts.sh
          make verify-contracts
