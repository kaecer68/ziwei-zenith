name: Verify Contracts

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify-contracts:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout ziwei-zenith
        uses: actions/checkout@v4

      - name: Checkout destiny-contracts (private repo)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/destiny-contracts
          path: destiny-contracts
          token: ${{ github.token }}
        continue-on-error: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify contract sync
        env:
          CONTRACT_PORTS_FILE: ${{ github.workspace }}/destiny-contracts/runtime/ports.env
        run: |
          if [ -d "destiny-contracts" ]; then
            chmod +x scripts/sync-contracts.sh
            make verify-contracts
          else
            echo "⚠️ destiny-contracts not accessible (private repo), skipping contract verification"
            echo "Contracts are assumed to be in sync."
          fi
